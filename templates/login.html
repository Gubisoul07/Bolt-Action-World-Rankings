{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<h1>Admin Login</h1>
<form method="post" style="max-width:300px;">
  <input type="password" name="password" placeholder="Password"
         style="width:100%; padding:0.5rem; margin-bottom:0.75rem; background:#16213e; color:#e0e0e0; border:1px solid #2a2a4a; border-radius:4px;">
  <button type="submit" style="width:100%; padding:0.5rem; background:#f0a500; color:#1a1a2e; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Login</button>
</form>
{% endblock %}
